<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#faf6ee">
<title>The Deep Guide · Taper to Zero</title>
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
  @font-face{
    font-family:'Fraunces';src:url('fonts/fraunces.woff2') format('woff2');
    font-weight:300 600;font-style:normal;font-display:swap;
  }
  @font-face{
    font-family:'Fraunces';src:url('fonts/fraunces-italic.woff2') format('woff2');
    font-weight:300 600;font-style:italic;font-display:swap;
  }
  @font-face{
    font-family:'Karla';src:url('fonts/karla.woff2') format('woff2');
    font-weight:400 700;font-style:normal;font-display:swap;
  }
  :root{
    color-scheme:light;
    --bg:#faf6ee;--surface:#fffdf8;--surface2:#f2ecdf;--line:#e6dcc8;
    --hair:rgba(59,43,20,.08);--sand:#2e261a;--ink:#5b5140;--muted:#8b7e67;
    --accent:#a5681f;--sage:#647d4b;
    --shadow-sm:0 4px 14px -6px rgba(59,43,20,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);color:var(--ink);font-family:'Karla',sans-serif;
    font-size:16px;line-height:1.6;max-width:480px;margin:0 auto;
    padding:calc(24px + env(safe-area-inset-top)) 20px 80px;
  }
  .back{display:inline-block;color:var(--accent);font-weight:700;font-size:14px;text-decoration:none;margin-bottom:18px}
  h1{font-family:'Fraunces',serif;font-weight:300;font-size:34px;line-height:1.1;color:var(--sand);margin-bottom:6px}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:20px;margin-top:24px;box-shadow:var(--shadow-sm);
  }
</style>
</head>
<body>
<a class="back" href="index.html">← Back to the taper</a>
<h1>The deep guide</h1>
<p style="color:var(--muted)">Research-backed handbook for this taper.</p>
<div class="card">
  <p>The full guide is being researched and written — evidence on tapering, the withdrawal
  timeline, what helps, and vetted resources, all with sources you can click.</p>
  <p style="margin-top:10px;color:var(--muted)">Check back after the next app update.</p>
</div>
</body>
</html>
